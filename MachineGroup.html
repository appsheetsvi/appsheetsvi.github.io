<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MachineGroup Management</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f0f4ff; }
        input, textarea, select { font-size: 14px; padding: 6px 8px !important; }
        th, td { padding: 8px 10px !important; font-size: 13px; }
        .tag { background: #3b82f6; color: white; padding: 4px 10px; margin: 4px; border-radius: 20px; display: inline-flex; align-items: center; }
        .tag button { margin-left: 8px; font-weight: bold; color: #fee2e2; }
        .autocomplete-suggestions { position: absolute; background: #fff; border: 1px solid #93c5fd; border-radius: 6px; max-height: 200px; overflow-y: auto; z-index: 50; width: 100%; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .autocomplete-suggestion { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #f3f4f6; }
        .autocomplete-suggestion:hover { background: #eff6ff; }
        .groupcode-label { display: inline-block; background: #1e40af; color: white; padding: 4px 12px; border-radius: 6px; font-weight: bold; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); display: none; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body class="p-4">

<div id="loading" class="loading-overlay flex-col">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-700 mb-2"></div>
    <span>กำลังประมวลผล...</span>
</div>

<nav class="bg-blue-600 text-white p-4 flex justify-between items-center rounded-lg shadow-md mb-6">
    <a href="https://appsheetsvi.github.io/Menu.html" class="hover:underline">🏠 Home</a>
    <div class="font-semibold text-lg">ระบบจัดการ Machine Group (PM)</div>
</nav>

<div class="max-w-4xl mx-auto flex flex-col gap-6">
    
    <div class="bg-white p-6 rounded-xl shadow-lg border-t-4 border-blue-500">
        <form id="groupForm" onsubmit="return false;">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-blue-800">ข้อมูลกลุ่ม</h2>
                <div class="text-right">
                    <label class="block text-xs font-semibold text-gray-500">GroupCode</label>
                    <div id="gGroupCode" class="groupcode-label">---</div>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <div class="mb-4">
                        <label class="block font-semibold text-gray-700 text-sm">ค้นหากลุ่มเดิมเพื่อแก้ไข</label>
                        <input type="text" id="searchGroupPM" placeholder="🔍 พิมพ์ชื่อกลุ่ม..." class="w-full border-2 border-blue-100 rounded focus:border-blue-500 outline-none">
                        <div id="searchGroupPMSuggestions" class="autocomplete-suggestions"></div>
                    </div>

                    <div class="mb-4">
                        <label class="block font-semibold text-sm">GroupName (PM)</label>
                        <input type="text" id="gGroupName" required class="w-full border-2 border-blue-100 rounded">
                    </div>

                    <div class="mb-4">
                        <label class="block font-semibold text-sm">Department</label>
                        <select id="gDeptCode" required class="w-full border-2 border-blue-100 rounded"></select>
                    </div>

                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <div>
                            <label class="block text-xs font-semibold">PmTime (นาที)</label>
                            <input type="number" id="gPmTime" value="0" class="w-full border rounded">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold">รอบ PM (วัน)</label>
                            <input type="number" id="gPmTime1" value="0" class="w-full border rounded">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="block text-xs font-semibold text-red-500">แจ้งเตือนล่วงหน้า (วัน)</label>
                        <input type="number" id="gAlertBefore" value="0" class="w-full border rounded border-red-200">
                    </div>
                </div>

                <div>
                    <div class="mb-4">
                        <label class="block font-semibold text-sm">รายละเอียด/วิเคราะห์/แก้ไข</label>
                        <textarea id="gProblemDetail" placeholder="อาการเสีย..." class="w-full border rounded mb-1 text-xs" rows="2"></textarea>
                        <textarea id="gCauseAnalysis" placeholder="สาเหตุ..." class="w-full border rounded mb-1 text-xs" rows="2"></textarea>
                        <textarea id="gComment" placeholder="การแก้ไข..." class="w-full border rounded text-xs" rows="2"></textarea>
                    </div>

                    <div class="mb-4 relative">
                        <label class="block font-semibold text-blue-700 text-sm">เครื่องจักรในกลุ่ม</label>
                        <input type="text" id="machineInput" placeholder="🔍 ค้นหาเครื่องจักรที่จะเพิ่ม..." class="w-full border-2 border-blue-300 rounded">
                        <div id="machineSuggestions" class="autocomplete-suggestions"></div>
                        <div id="groupMachines" class="mt-2 flex flex-wrap max-h-32 overflow-y-auto border border-dashed border-gray-200 p-2 rounded"></div>
                    </div>
                </div>
            </div>

            <div class="flex gap-2 mt-4">
                <button id="groupAddBtn" type="button" class="flex-1 bg-blue-700 text-white py-2 rounded-lg font-bold hover:bg-blue-800 transition">บันทึกกลุ่มใหม่</button>
                <button id="groupEditBtn" type="button" class="flex-1 bg-green-600 text-white py-2 rounded-lg font-bold hover:bg-green-700 hidden">ยืนยันการแก้ไข</button>
                <button id="groupCancelBtn" type="button" class="w-24 bg-gray-400 text-white py-2 rounded-lg hover:bg-gray-500 hidden">ยกเลิก</button>
            </div>
            <div id="groupMsg" class="mt-4 p-2 bg-green-100 text-green-700 text-center rounded hidden">บันทึกสำเร็จ!</div>
        </form>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-lg">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-4">
            <h2 class="text-xl font-bold">รายงานกลุ่มเครื่องจักร</h2>
            <input type="text" id="searchAll" placeholder="🔍 พิมพ์เพื่อค้นหารายงาน..." class="border-2 border-blue-200 rounded-lg px-4 py-2 w-full md:w-1/2 focus:border-blue-500 outline-none">
        </div>
        
        <div id="reportContainer" style="display: none;">
            <div class="overflow-x-auto">
                <table id="groupTable" class="w-full border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600">
                            <th class="border-b text-left">GroupCode</th>
                            <th class="border-b text-left">GroupName</th>
                            <th class="border-b text-left">Dept</th>
                            <th class="border-b text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="emptySearchMsg" class="text-center py-10 text-gray-400 italic">
            กรุณาพิมพ์ในช่องค้นหาเพื่อแสดงข้อมูลรายงาน
        </div>
    </div>
</div>

<script>
const appId = "ae5d7dce-1c12-4c53-b201-5a2d7c5b5411";
const apiKey = "V2-b1wGR-Nj1SR-0MhEx-QWCHT-Mllly-cZnc9-PHCAK-r1f85";
const currentEmp = localStorage.getItem("EmpCode") || "EMP001";

let machinesData = [], groupsData = [], deptsData = [], selectedMachines = [], originalMachines = [], editRow = null;

async function apiCall(tableName, action, rows) {
    toggleLoading(true);
    try {
        const res = await fetch(`https://api.appsheet.com/api/v2/apps/${appId}/tables/${tableName}/Action`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "ApplicationAccessKey": apiKey },
            body: JSON.stringify({ Action: action, Rows: rows || [] })
        });
        return await res.json();
    } catch (e) {
        console.error(`Error ${action} ${tableName}:`, e);
        return null;
    } finally {
        toggleLoading(false);
    }
}

async function fetchTable(tableName) {
    const res = await apiCall(tableName, "Find", []);
    return res || [];
}

function toggleLoading(show) {
    document.getElementById("loading").style.display = show ? "flex" : "none";
}

(async () => {
    [machinesData, deptsData, groupsData] = await Promise.all([
        fetchTable("MachineMaster"),
        fetchTable("Department"),
        fetchTable("MachineGroup")
    ]);
    renderDepts();
    renderGroupTable();
    generateGroupCode();
})();

function renderDepts() {
    const select = document.getElementById("gDeptCode");
    select.innerHTML = '<option value="">-- เลือกแผนก --</option>';
    deptsData.forEach(d => {
        const opt = document.createElement("option");
        opt.value = d.DeptCode;
        opt.textContent = `${d.DeptCode} : ${d.DeptNameEng || d.DeptName}`;
        select.appendChild(opt);
    });
}

function generateGroupCode() {
    const date = new Date();
    const prefix = `${date.getFullYear()}${(date.getMonth() + 1).toString().padStart(2, '0')}`;
    let max = 0;
    groupsData.forEach(g => {
        if (g.GroupCode?.startsWith(prefix)) {
            const num = parseInt(g.GroupCode.slice(-3));
            if (num > max) max = num;
        }
    });
    document.getElementById("gGroupCode").textContent = `${prefix}${(max + 1).toString().padStart(3, '0')}`;
}

document.getElementById("machineInput").addEventListener("input", e => {
    const val = e.target.value.toLowerCase();
    const dept = document.getElementById("gDeptCode").value;
    const suggDiv = document.getElementById("machineSuggestions");
    if (!val || !dept) { suggDiv.style.display = "none"; return; }
    const filtered = machinesData.filter(m => m.DeptCode === dept && m["รายชื่อเครื่องจักร1"]?.toLowerCase().includes(val));
    suggDiv.innerHTML = "";
    filtered.forEach(m => {
        const div = document.createElement("div");
        div.className = "autocomplete-suggestion";
        div.textContent = m["รายชื่อเครื่องจักร1"];
        div.onclick = () => {
            if (!selectedMachines.includes(m["รายชื่อเครื่องจักร1"])) {
                selectedMachines.push(m["รายชื่อเครื่องจักร1"]);
                renderTags();
            }
            e.target.value = "";
            suggDiv.style.display = "none";
        };
        suggDiv.appendChild(div);
    });
    suggDiv.style.display = filtered.length ? "block" : "none";
});

function renderTags() {
    const container = document.getElementById("groupMachines");
    container.innerHTML = "";
    selectedMachines.forEach(name => {
        const span = document.createElement("span");
        span.className = "tag text-xs";
        span.innerHTML = `${name} <button type="button" onclick="removeTag('${name}')">&times;</button>`;
        container.appendChild(span);
    });
}

function removeTag(name) {
    selectedMachines = selectedMachines.filter(n => n !== name);
    renderTags();
}

async function saveGroup(isEdit) {
    const gCode = document.getElementById("gGroupCode").textContent;
    const gName = document.getElementById("gGroupName").value.trim();
    const gDept = document.getElementById("gDeptCode").value;
    if (!gName || !gDept) return alert("กรุณาระบุชื่อกลุ่มและแผนก");

    const payload = {
        GroupCode: gCode, GroupName: gName, DeptCode: gDept,
        "รายละเอียดอาการเสีย": document.getElementById("gProblemDetail").value,
        "วิเคราะห์สาเหตุ": document.getElementById("gCauseAnalysis").value,
        "การแก้ไขความคิดเห็น": document.getElementById("gComment").value,
        PmTime: parseInt(document.getElementById("gPmTime").value) || 0,
        PmTime1: parseInt(document.getElementById("gPmTime1").value) || 0,
        AlertBefore: parseInt(document.getElementById("gAlertBefore").value) || 0,
        ModifiedBy: currentEmp, ModifiedDate: new Date().toISOString()
    };

    if (!isEdit) { payload.CreatedBy = currentEmp; payload.CreatedDate = payload.ModifiedDate; }
    const result = await apiCall("MachineGroup", isEdit ? "Edit" : "Add", [payload]);
    if (!result) return alert("บันทึกกลุ่มไม่สำเร็จ");

    const machineUpdates = [];
    selectedMachines.forEach(mName => {
        const m = machinesData.find(x => x["รายชื่อเครื่องจักร1"] === mName);
        if (m) machineUpdates.push({ "รหัสเครื่อง": m["รหัสเครื่อง"], "GroupCode": gCode });
    });
    if (isEdit) {
        const removed = originalMachines.filter(name => !selectedMachines.includes(name));
        removed.forEach(mName => {
            const m = machinesData.find(x => x["รายชื่อเครื่องจักร1"] === mName);
            if (m) machineUpdates.push({ "รหัสเครื่อง": m["รหัสเครื่อง"], "GroupCode": "" });
        });
    }
    if (machineUpdates.length > 0) {
        await apiCall("MachineMaster", "Edit", machineUpdates);
        machineUpdates.forEach(upd => {
            const idx = machinesData.findIndex(m => m["รหัสเครื่อง"] === upd["รหัสเครื่อง"]);
            if (idx !== -1) machinesData[idx].GroupCode = upd.GroupCode;
        });
    }

    groupsData = await fetchTable("MachineGroup");
    renderGroupTable();
    resetForm();
    document.getElementById("groupMsg").classList.remove("hidden");
    setTimeout(() => document.getElementById("groupMsg").classList.add("hidden"), 3000);
}

function renderGroupTable() {
    const tbody = document.querySelector("#groupTable tbody");
    tbody.innerHTML = "";
    groupsData.forEach(g => {
        const tr = document.createElement("tr");
        tr.className = "hover:bg-blue-50";
        tr.innerHTML = `
            <td class="border-b py-2">${g.GroupCode}</td>
            <td class="border-b py-2">${g.GroupName}</td>
            <td class="border-b py-2">${g.DeptCode}</td>
            <td class="border-b py-2 text-center">
                <button onclick="editGroup('${g.GroupCode}')" class="text-blue-600 font-bold hover:underline">แก้ไข</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

function editGroup(code) {
    const g = groupsData.find(x => x.GroupCode === code);
    if (!g) return;
    document.getElementById("gGroupCode").textContent = g.GroupCode;
    document.getElementById("gGroupName").value = g.GroupName;
    document.getElementById("gDeptCode").value = g.DeptCode;
    document.getElementById("gProblemDetail").value = g["รายละเอียดอาการเสีย"] || "";
    document.getElementById("gCauseAnalysis").value = g["วิเคราะห์สาเหตุ"] || "";
    document.getElementById("gComment").value = g["การแก้ไขความคิดเห็น"] || "";
    document.getElementById("gPmTime").value = g.PmTime || 0;
    document.getElementById("gPmTime1").value = g.PmTime1 || 0;
    document.getElementById("gAlertBefore").value = g.AlertBefore || 0;
    selectedMachines = machinesData.filter(m => m.GroupCode === code).map(m => m["รายชื่อเครื่องจักร1"]);
    originalMachines = [...selectedMachines];
    renderTags();
    document.getElementById("groupAddBtn").classList.add("hidden");
    document.getElementById("groupEditBtn").classList.remove("hidden");
    document.getElementById("groupCancelBtn").classList.remove("hidden");
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetForm() {
    document.getElementById("groupForm").reset();
    selectedMachines = []; originalMachines = [];
    renderTags(); generateGroupCode();
    document.getElementById("groupAddBtn").classList.remove("hidden");
    document.getElementById("groupEditBtn").classList.add("hidden");
    document.getElementById("groupCancelBtn").classList.add("hidden");
}

document.getElementById("groupAddBtn").onclick = () => saveGroup(false);
document.getElementById("groupEditBtn").onclick = () => saveGroup(true);
document.getElementById("groupCancelBtn").onclick = resetForm;

// Search Logic สำหรับแก้ไข
document.getElementById("searchGroupPM").addEventListener("input", e => {
    const val = e.target.value.toLowerCase();
    const suggDiv = document.getElementById("searchGroupPMSuggestions");
    if (!val) { suggDiv.style.display = "none"; return; }
    const filtered = groupsData.filter(g => g.GroupName?.toLowerCase().includes(val));
    suggDiv.innerHTML = "";
    filtered.forEach(g => {
        const div = document.createElement("div");
        div.className = "autocomplete-suggestion";
        div.textContent = g.GroupName;
        div.onclick = () => { editGroup(g.GroupCode); suggDiv.style.display = "none"; e.target.value = ""; };
        suggDiv.appendChild(div);
    });
    suggDiv.style.display = filtered.length ? "block" : "none";
});

// Search Table Logic (แสดงเมื่อค้นหาเท่านั้น)
document.getElementById("searchAll").oninput = (e) => {
    const val = e.target.value.trim().toLowerCase();
    const reportDiv = document.getElementById("reportContainer");
    const emptyMsg = document.getElementById("emptySearchMsg");
    const rows = document.querySelectorAll("#groupTable tbody tr");
    
    if (val === "") {
        reportDiv.style.display = "none";
        emptyMsg.style.display = "block";
    } else {
        reportDiv.style.display = "block";
        emptyMsg.style.display = "none";
        rows.forEach(r => {
            r.style.display = r.innerText.toLowerCase().includes(val) ? "" : "none";
        });
    }
};
</script>
</body>
</html>
