<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Login | ระบบแจ้งซ่อม</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Kanit',sans-serif;
background:#e3f2fd;
}

/* login */

.login-card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
max-width:420px;
width:95%;
}

/* popup */

.modal-dialog{
max-width:650px;
}

.modal-content{
border-radius:18px;
border:0;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

.modal-header{
font-size:18px;
}

.modal-body{
max-height:420px;
overflow:auto;
padding:20px;
}

/* pm card */

.pm-card{
background:white;
border-radius:14px;
padding:16px 18px;
margin-bottom:12px;
border-left:6px solid #ff9800;
box-shadow:0 3px 8px rgba(0,0,0,0.05);
display:flex;
justify-content:space-between;
align-items:center;
}

.pm-overdue{
border-left:6px solid #e53935;
background:#fff5f5;
}

.pm-warning{
border-left:6px solid #ff9800;
background:#fffaf2;
}

.pm-name{
font-weight:600;
font-size:15px;
color:#0d6efd;
}

.pm-date{
font-size:13px;
color:#444;
}

.pm-badge{
font-size:12px;
padding:4px 10px;
border-radius:20px;
color:white;
}

.badge-overdue{
background:#e53935;
}

.badge-warning{
background:#ff9800;
}

@media(max-width:600px){

.modal-dialog{
max-width:95%;
}

.pm-card{
flex-direction:column;
align-items:flex-start;
gap:6px;
}

.pm-name{
font-size:16px;
}

.pm-date{
font-size:14px;
}

}

</style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

<div class="login-card">

<h4 class="text-center mb-4">เข้าสู่ระบบ</h4>

<form id="loginForm">

<input type="text" id="empCode" class="form-control mb-3" placeholder="รหัสพนักงาน" required>

<input type="password" id="password" class="form-control mb-3" placeholder="รหัสผ่าน" required>

<button type="submit" id="loginBtn" class="btn btn-primary w-100">
เข้าสู่ระบบ
</button>

</form>

<div id="msg" class="text-danger text-center mt-3"></div>

</div>


<!-- POPUP PM -->

<div class="modal fade" id="pmAlertModal">

<div class="modal-dialog modal-dialog-centered">

<div class="modal-content">

<div class="modal-header bg-warning">
<h6 class="modal-title fw-bold">⚠ แจ้งเตือนงาน PM</h6>
</div>

<div class="modal-body" id="pmListContainer"></div>

<div class="modal-footer">
<button class="btn btn-primary w-100"
onclick="window.location.href='Menu.html'">
รับทราบ
</button>
</div>

</div>
</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const appId="ae5d7dce-1c12-4c53-b201-5a2d7c5b5411";
const apiKey="V2-b1wGR-Nj1SR-0MhEx-QWCHT-Mllly-cZnc9-PHCAK-r1f85";
const apiBase=`https://api.appsheet.com/api/v2/apps/${appId}/tables/`;


/* format วันที่ พ.ศ. */

function formatThaiDate(date){

const d = String(date.getDate()).padStart(2,'0');
const m = String(date.getMonth()+1).padStart(2,'0');
const y = date.getFullYear()+543;

return `${d}/${m}/${y}`;

}


/* โหลดข้อมูลจาก AppSheet */

async function fetchTable(table){

const res = await fetch(`${apiBase}${table}/Action`,{

method:"POST",

headers:{
"ApplicationAccessKey":apiKey,
"Content-Type":"application/json"
},

body:JSON.stringify({
Action:"Find",
Properties:{},
Rows:[]
})

});

return await res.json();

}


/* ตรวจสอบ PM */

async function checkPMAndRedirect(){

try{

const [groups,repairs] = await Promise.all([
fetchTable("MachineGroup"),
fetchTable("RepairTechnicians")
]);

const alerts=[];

const today = new Date();
today.setHours(0,0,0,0);

groups.forEach(g=>{

const history = repairs.filter(r=>
String(r.GroupCode) === String(g.GroupCode)
);

if(history.length === 0) return;


/* หา record ล่าสุด */

let lastDate=null;

history.forEach(r=>{

const d = new Date(r.DateModified);

if(!d || isNaN(d)) return;

d.setHours(0,0,0,0);

if(!lastDate || d > lastDate){
lastDate=d;
}

});

if(!lastDate) return;


/* คำนวณ PM */

const pmDays=parseInt(g.PmTime1)||0;
const alertBefore=parseInt(g.AlertBefore)||0;

const dueDate=new Date(lastDate);
dueDate.setDate(dueDate.getDate()+pmDays);
dueDate.setHours(0,0,0,0);

const alertDate=new Date(dueDate);
alertDate.setDate(alertDate.getDate()-alertBefore);
alertDate.setHours(0,0,0,0);

if(today>=alertDate){

let status="warning";
let badge="ใกล้ครบ";

if(today>dueDate){
status="overdue";
badge="เกินกำหนด";
}

alerts.push({
name:g.GroupName,
due:formatThaiDate(dueDate),
status:status,
badge:badge
});

}

});


if(alerts.length>0){

document.getElementById("pmListContainer").innerHTML=

alerts.map(i=>`

<div class="pm-card pm-${i.status}">

<div>
<div class="pm-name">${i.name}</div>
<div class="pm-date">ครบกำหนด ${i.due}</div>
</div>

<div class="pm-badge badge-${i.status}">
${i.badge}
</div>

</div>

`).join('');

new bootstrap.Modal(
document.getElementById("pmAlertModal")
).show();

}
else{

window.location.href="Menu.html";

}

}
catch(e){

console.log(e);
window.location.href="Menu.html";

}

}



/* LOGIN */

document.getElementById("loginForm").addEventListener("submit",async(e)=>{

e.preventDefault();

const code=document.getElementById("empCode").value.trim();
const pass=document.getElementById("password").value.trim();

const data=await fetchTable("Emp");

const user=data.find(d=>
String(d.EmpCode)===code &&
String(d.Password)===pass
);

if(user){

localStorage.setItem("user",JSON.stringify(user));

document.getElementById("loginBtn").textContent="กำลังโหลด...";

checkPMAndRedirect();

}
else{

document.getElementById("msg").textContent="รหัสพนักงานหรือรหัสผ่านไม่ถูกต้อง";

}

});

</script>

</body>
</html>
