<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ระบบแจ้งซ่อม</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #1e88e5, #64b5f6);
            min-height: 100vh;
        }

        /* --- LOGIN CARD --- */
        .login-container { width: 100%; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-card {
            background: white; padding: 40px; border-radius: 22px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            max-width: 420px; width: 100%;
        }
        .login-title { font-weight: 600; color: #0d6efd; }
        .form-control { border-radius: 10px; padding: 12px; font-size: 15px; }
        .btn-primary { border-radius: 10px; padding: 12px; font-weight: 500; }

        /* --- MODAL PM DESIGN --- */
        .modal-content { border-radius: 20px; border: 0; overflow: hidden; max-height: 90vh; }
        
        .modal-body-custom {
            max-height: 50vh; 
            overflow-y: auto;
            padding: 0 20px;
        }
        .modal-body-custom::-webkit-scrollbar { width: 5px; }
        .modal-body-custom::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

        .modal-footer-sticky {
            position: sticky;
            bottom: 0;
            background: white;
            padding: 15px 20px;
            border-top: 1px solid #eee;
            z-index: 100;
        }

        /* PM CARD STYLE */
        .pm-card {
            background: white; border-radius: 12px; padding: 15px;
            margin-bottom: 12px; border-left: 6px solid #ff9800;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .pm-overdue { border-left-color: #e53935; background: #fff5f5; }
        .pm-warning { border-left-color: #ff9800; background: #fffaf2; }
        .pm-name { font-weight: 600; font-size: 15px; color: #0d6efd; margin-bottom: 4px; }
        .pm-line { font-size: 13px; margin-bottom: 2px; color: #555; }
        .pm-status { font-size: 13px; font-weight: 600; margin-top: 5px; }
        .overdue { color: #e53935; }
        .warning { color: #ff9800; }

        @media(max-width:768px){
            body { background: white; }
            .login-card { box-shadow: none; border-radius: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="login-container">
    <div class="login-card">
        <h4 class="text-center mb-4 login-title">🔧 ระบบแจ้งซ่อม</h4>
        <form id="loginForm">
            <input type="text" id="empCode" class="form-control mb-3" placeholder="รหัสพนักงาน" required>
            <input type="password" id="password" class="form-control mb-3" placeholder="รหัสผ่าน" required>
            <button type="submit" id="loginBtn" class="btn btn-primary w-100">เข้าสู่ระบบ</button>
        </form>
        <div id="msg" class="text-danger text-center mt-3" style="font-size: 14px;"></div>
    </div>
</div>

<div class="modal fade" id="pmAlertModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-warning">
                <h6 class="modal-title fw-bold m-0 text-dark">🔧 รายการแจ้งเตือน PM</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-0">
                <div class="p-3">
                    <input type="text" class="form-control mb-2" placeholder="🔍 ค้นหาเครื่อง..." id="searchPM" onkeyup="filterPM()">
                    <div id="pmSummary" class="text-center p-2 bg-light rounded border fw-bold" style="font-size: 13px;"></div>
                </div>
                <div id="pmListContainer" class="modal-body-custom"></div>
            </div>
            <div class="modal-footer-sticky">
                <button class="btn btn-primary w-100 py-3 fw-bold shadow-sm" onclick="window.location.href='Menu.html'">
                    ✅ รับทราบและเข้าสู่เมนู
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const appId = "ae5d7dce-1c12-4c53-b201-5a2d7c5b5411";
    const apiKey = "V2-b1wGR-Nj1SR-0MhEx-QWCHT-Mllly-cZnc9-PHCAK-r1f85";
    const apiBase = `https://api.appsheet.com/api/v2/apps/${appId}/tables/`;

    function formatThaiDate(date) {
        const d = String(date.getDate()).padStart(2, '0');
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const y = date.getFullYear() + 543;
        return `${d}/${m}/${y}`;
    }

    // ฟังก์ชันดึงข้อมูลพร้อมระบบแจ้งเตือน Error
    async function fetchTable(table) {
        try {
            const res = await fetch(`${apiBase}${table}/Action`, {
                method: "POST",
                headers: { "ApplicationAccessKey": apiKey, "Content-Type": "application/json" },
                body: JSON.stringify({ Action: "Find", Properties: {}, Rows: [] })
            });
            if (!res.ok) throw new Error(`ไม่พบตาราง ${table} หรือ API Key ผิด`);
            return await res.json();
        } catch (err) {
            console.error(err);
            throw err;
        }
    }

    async function checkPMAndRedirect() {
        const loginBtn = document.getElementById("loginBtn");
        try {
            // ดึงข้อมูล 2 ตารางพร้อมกัน
            const [groups, repairs] = await Promise.all([
                fetchTable("MachineGroup"),
                fetchTable("RepairTechnicians")
            ]);

            const alerts = [];
            let overdueCount = 0;
            let warningCount = 0;
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            groups.forEach(g => {
                const history = repairs.filter(r => String(r.GroupCode) === String(g.GroupCode));
                if (history.length === 0) return;

                let lastDate = null;
                history.forEach(r => {
                    const d = new Date(r.DateModified);
                    if (!d || isNaN(d)) return;
                    d.setHours(0, 0, 0, 0);
                    if (!lastDate || d > lastDate) lastDate = d;
                });

                if (!lastDate) return;
                const pmDays = parseInt(g.PmTime1);
                const alertBefore = parseInt(g.AlertBefore);
                if (!pmDays) return;

                const dueDate = new Date(lastDate);
                dueDate.setDate(dueDate.getDate() + pmDays);
                
                const alertDate = new Date(dueDate);
                alertDate.setDate(alertDate.getDate() - (alertBefore || 0));

                if (today >= alertDate) {
                    const diffDays = Math.ceil((dueDate - today) / (1000 * 60 * 60 * 24));
                    let status = "warning";
                    let text = `เหลืออีก ${diffDays} วัน`;

                    if (diffDays < 0) {
                        status = "overdue";
                        text = `เกินกำหนด ${Math.abs(diffDays)} วัน`;
                        overdueCount++;
                    } else {
                        warningCount++;
                    }

                    alerts.push({
                        name: g.GroupName,
                        last: formatThaiDate(lastDate),
                        due: formatThaiDate(dueDate),
                        pm: pmDays,
                        status: status,
                        text: text
                    });
                }
            });

            if (alerts.length > 0) {
                alerts.sort((a, b) => (a.status === "overdue" ? -1 : 1));
                document.getElementById("pmSummary").innerHTML = 
                    `ทั้งหมด ${alerts.length} เครื่อง | <span class="warning">ใกล้ถึง ${warningCount}</span> | <span class="overdue">เกิน ${overdueCount}</span>`;
                document.getElementById("pmListContainer").innerHTML = alerts.map(i => `
                    <div class="pm-card pm-${i.status}">
                        <div class="pm-name">${i.name}</div>
                        <div class="pm-line">📅 ล่าสุด: ${i.last}</div>
                        <div class="pm-line">⏰ กำหนด: ${i.due} (รอบ ${i.pm} วัน)</div>
                        <div class="pm-status ${i.status}">
                            ${i.status === "overdue" ? "🔴" : "🟠"} ${i.text}
                        </div>
                    </div>
                `).join('');
                new bootstrap.Modal(document.getElementById("pmAlertModal")).show();
                loginBtn.textContent = "เข้าสู่ระบบ";
                loginBtn.disabled = false;
            } else {
                window.location.href = "Menu.html";
            }
        } catch (e) {
            alert("ค้างที่หน้าโหลดเพราะ: " + e.message + "\nกรุณาตรวจสอบชื่อตารางใน AppSheet");
            loginBtn.textContent = "เข้าสู่ระบบ";
            loginBtn.disabled = false;
        }
    }

    function filterPM() {
        const keyword = document.getElementById("searchPM").value.toLowerCase();
        const cards = document.querySelectorAll(".pm-card");
        cards.forEach(card => {
            const name = card.querySelector(".pm-name").innerText.toLowerCase();
            card.style.display = name.includes(keyword) ? "block" : "none";
        });
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const code = document.getElementById("empCode").value.trim();
        const pass = document.getElementById("password").value.trim();
        const loginBtn = document.getElementById("loginBtn");
        const msg = document.getElementById("msg");

        msg.textContent = "";
        loginBtn.disabled = true;
        loginBtn.textContent = "กำลังตรวจสอบผู้ใช้...";

        try {
            const data = await fetchTable("Emp");
            const user = data.find(d => String(d.EmpCode) === code && String(d.Password) === pass);

            if (user) {
                localStorage.setItem("user", JSON.stringify(user));
                loginBtn.textContent = "กำลังโหลดข้อมูล PM...";
                checkPMAndRedirect();
            } else {
                msg.textContent = "รหัสพนักงานหรือรหัสผ่านไม่ถูกต้อง";
                loginBtn.disabled = false;
                loginBtn.textContent = "เข้าสู่ระบบ";
            }
        } catch (err) {
            msg.textContent = "เชื่อมต่อตาราง Emp ไม่สำเร็จ";
            loginBtn.disabled = false;
            loginBtn.textContent = "เข้าสู่ระบบ";
        }
    });
</script>

</body>
</html>
