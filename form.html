<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ระบบแจ้งซ่อมเครื่องจักร + PM</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet" />
<style>
body { font-family:'Sarabun',sans-serif; background:#f0f9ff; min-height:100vh; }
@media (max-width: 640px) {
  input, textarea, select {
    font-size: 1rem;
    padding: 0.5rem 0.75rem;
  }
  label { font-size: 0.95rem; }
  .tech-checkbox { flex: 1 1 250%; } /* กล่องช่างเรียงแนวตั้ง */
}
input:focus, textarea:focus, select:focus {
  outline:none; border-color:#3b82f6;
  box-shadow:0 0 0 2px rgba(59,130,246,0.4); background:#fff;
}
textarea { min-height:3rem; }
.parts-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
.parts-row > * { flex:1 1 120px; }
.btn-remove-part {
  background:#ef4444;color:white;padding:4px 8px;border-radius:6px;
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
}
.btn-remove-part:hover { background:#b91c1c; }
.tech-checkboxes { display:flex; flex-wrap:wrap; gap:8px; margin-top:4px; }
.tech-checkbox {
  flex:1 1 250px; background:#f9fafb; border:1px solid #ccc; padding:12px;
  border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.05); display:flex; flex-direction:column;
}
.machine-container {
  border:1px solid #ccc; padding:12px; border-radius:10px;
  margin-bottom:12px; background:#fff; position:relative;
}
.btn-remove-machine {
  position:absolute; top:8px; right:8px;
  background:#ef4444; color:white; padding:2px 6px; border-radius:6px; cursor:pointer;
}
.btn-remove-machine:hover { background:#b91c1c; }
/* ซ่อน scroll bar และเลื่อนด้วย touch */
#deptList, #pmGroupList, .machineList {
  max-height: 200px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
#deptList::-webkit-scrollbar,
#pmGroupList::-webkit-scrollbar,
.machineList::-webkit-scrollbar {
  display: none;
}
@media (max-width: 640px) {
  .tech-checkbox {
    flex: 1 1 100%;   /* บังคับเต็มจอในมือถือ */
  }
}
</style>
</head>
<body>
<div>  
<nav class="bg-blue-600 text-white p-4 flex justify-between items-center">
  <a href="https://appsheetsvi.github.io/Menu.html" class="font-semibold">🏠 Home</a>
  <div class="font-semibold text-lg">ระบบแจ้งซ่อมออนไลน์</div>

<main class="w-full max-w-3xl mx-auto mt-4 p-4 bg-white rounded-lg shadow">  
<h1 class="text-2xl font-bold text-blue-700 text-center mb-6">📋 ฟอร์มแจ้งซ่อมเครื่องจักร </h1>

<form id="repairForm" class="grid gap-6" autocomplete="off">
  <!-- หน่วยงาน -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="font-semibold">เลขที่ใบแจ้งซ่อม</label>
      <input name="เลขที่ใบแจ้งซ่อม" readonly class="w-full bg-gray-100"/>

<input type="hidden" id="deptCodeHidden" name="หน่วยงาน"/>

<input type="hidden" id="groupCodeHidden" name="GroupCode"/>

</form>

<script>
const appId="ae5d7dce-1c12-4c53-b201-5a2d7c5b5411";
const apiKey="V2-b1wGR-Nj1SR-0MhEx-QWCHT-Mllly-cZnc9-PHCAK-r1f85";
const apiBase=`https://api.appsheet.com/api/v2/apps/${appId}/tables/`;
let deptList=[], machineList=[], empList=[], groupList=[];
const $=id=>document.getElementById(id);

let deptSelectStartTime = null;   // เวลาเริ่มหลังจากเลือกหน่วยงาน

// ------- Fetch Table -------
async function fetchFromTable(table){
  try{
    const res = await fetch(`${apiBase}${table}/Find`, {
      method:"POST",
      headers:{"Content-Type":"application/json","ApplicationAccessKey":apiKey},
      body: JSON.stringify({})
    });
    if(!res.ok) return [];
    const data = await res.json();
    return data;
  }catch(err){
    console.error("Fetch error:", table, err);
    return [];
  }
}

// ------- Generate Request Number (YYMM###) -------
async function generateNextRequestNumber(){
  const list = await fetchFromTable("RepairTechnicians");
  const nums = list.map(r => r["เลขที่ใบแจ้งซ่อม"]).filter(n => !!n);

  const now = new Date();
  const year = now.getFullYear().toString().slice(-2); // ปี ค.ศ. 2 หลัก
  const month = (now.getMonth() + 1).toString().padStart(2, "0"); // เดือน 2 หลัก
  const prefix = year + month; // เช่น "2511"

  const filtered = nums.filter(n => n.startsWith(prefix));
  if(filtered.length === 0){
    $("repairForm").querySelector('input[name="เลขที่ใบแจ้งซ่อม"]').value = prefix + "001";
  } else {
    const max = Math.max(...filtered.map(n => parseInt(n)));
    $("repairForm").querySelector('input[name="เลขที่ใบแจ้งซ่อม"]').value = (max + 1).toString();
  }
}

// ------- Load master data -------
async function loadDepartments(){ deptList = await fetchFromTable("Department"); }
async function loadMachines(){ machineList = await fetchFromTable("MachineMaster"); }
async function loadTechnicians(){ 
  const all=await fetchFromTable("Emp"); 
  empList=all.filter(e=>e.EmpStatus==0 && e.DeptCode==="A12"); 
}
async function loadGroups(){ groupList = await fetchFromTable("MachineGroup"); }

// ------- Parts Row -------
function createPartRow(){
  const div=document.createElement("div");
  div.className="parts-row";
  div.innerHTML=`
    <input type="text" name="รายการอะไหล่" placeholder="รายการอะไหล่"/>
    <input type="number" name="จำนวน" min="1" value="1"/>
    <input type="text" name="หน่วย" placeholder="หน่วย"/>
    <button type="button" class="btn-remove-part">x</button>`;
  div.querySelector("button").onclick=()=>div.remove();
  return div;
}

// ------- Technician Box -------
function createTechBox(emp){
  const div = document.createElement("div");
  div.className="tech-checkbox";
  div.innerHTML=`
    <label class="inline-flex items-center space-x-2 font-semibold">
      <input type="checkbox" name="ช่างผู้รับผิดชอบ" value="${emp.EmpCode}"/> ${emp.EmpName}
    </label>
    <textarea name="comment_${emp.EmpCode}" placeholder="ความคิดเห็น" class="mt-1"></textarea>
    <div class="flex flex-col flex-1">
      <label class="text-xs">วันที่เริ่ม</label>
      <input type="datetime-local" name="start_${emp.EmpCode}" 
             class="w-full max-w-[140px] sm:max-w-full text-sm px-1" />
    </div>
    <div class="flex flex-col flex-1">
      <label class="text-xs">วันที่จบ</label>
      <input type="datetime-local" name="end_${emp.EmpCode}" 
             class="w-full max-w-[140px] sm:max-w-full text-sm px-1" />
    </div>
    <div class="flex gap-2 mt-1">
      <label><input type="checkbox" name="status_${emp.EmpCode}" value="จบงาน"/> จบงาน</label>
      <label><input type="checkbox" name="status_${emp.EmpCode}" value="ไม่จบงาน"/> ไม่จบงาน</label>
    </div>
    <label class="inline-flex items-center mt-1">
      <input type="checkbox" name="autoCopy_${emp.EmpCode}"/>
      คัดลอกข้อมูลไปช่างอื่นในเครื่องเดียวกัน
    </label>
  `;
  return div;
}

// ------- Machine Row -------
function createMachineRow(){
  const div = document.createElement("div");
  div.className="machine-container";
  div.innerHTML=`
    <button type="button" class="btn-remove-machine">x</button>
    <label class="font-semibold">รายชื่อเครื่อง</label>
    <div class="relative">
      <input type="text" class="machineSearch w-full" placeholder="🔍 พิมพ์ชื่อย่อเครื่อง..." required/>
      <ul class="machineList absolute w-full bg-white max-h-40 overflow-y-auto border rounded z-10 hidden"></ul>
    </div>
    <input type="hidden" name="รหัสเครื่อง" class="machineCodeHidden" required/>
    <label class="font-semibold mt-2">รายละเอียด/อาการเสีย</label>
    <textarea name="รายละเอียดอาการเสีย" class="w-full" rows="2" required></textarea>
    <label class="font-semibold mt-2">วิเคราะห์สาเหตุ</label>
    <textarea name="วิเคราะห์สาเหตุ" class="w-full" rows="2" required></textarea>
    <label class="font-semibold mt-2">เลือกช่างผู้รับผิดชอบ (สูงสุด 3 คน)</label>
    <div class="tech-checkboxes mb-2"></div>
    <label class="font-semibold mt-2">รายการอะไหล่</label>
    <div class="partsContainer"></div>
    <button type="button" class="btnAddPart mt-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">+ เพิ่มอะไหล่</button>
  `;
  div.querySelector(".btn-remove-machine").onclick=()=>div.remove();
  div.querySelector(".btnAddPart").onclick=()=>div.querySelector(".partsContainer").appendChild(createPartRow());

  const techContainer = div.querySelector(".tech-checkboxes");
  empList.forEach(emp=>techContainer.appendChild(createTechBox(emp)));

  // จำกัดเลือกช่างไม่เกิน 3
  techContainer.addEventListener("change", e=>{
    if(e.target.name==="ช่างผู้รับผิดชอบ"){
      const selected=techContainer.querySelectorAll('input[name="ช่างผู้รับผิดชอบ"]:checked');
      if(selected.length>3){
        e.target.checked=false;
        alert("เลือกช่างได้สูงสุด 3 คน");
      }
    }
  });

  // Logic คัดลอกข้อมูลระหว่างช่าง
  techContainer.querySelectorAll('input[type="checkbox"][name^="autoCopy_"]').forEach(cb=>{
  cb.addEventListener("change", ()=>{
    if(!cb.checked) return;
    const code = cb.name.replace("autoCopy_","");
    const sourceDiv = techContainer.querySelector(`input[value="${code}"]`).closest(".tech-checkbox");
    const data = {
      comment: sourceDiv.querySelector(`textarea[name="comment_${code}"]`).value,
      start: sourceDiv.querySelector(`input[name="start_${code}"]`).value,
      end: sourceDiv.querySelector(`input[name="end_${code}"]`).value,
      status: [...sourceDiv.querySelectorAll(`input[name="status_${code}"]:checked`)].map(c=>c.value)
    };
    techContainer.querySelectorAll(".tech-checkbox").forEach(tc=>{
      const empCode = tc.querySelector('input[name="ช่างผู้รับผิดชอบ"]').value;
      if(empCode!==code){
        tc.querySelector(`textarea[name="comment_${empCode}"]`).value = data.comment;
        tc.querySelector(`input[name="start_${empCode}"]`).value = data.start;
        tc.querySelector(`input[name="end_${empCode}"]`).value = data.end;
        tc.querySelectorAll(`input[name="status_${empCode}"]`).forEach(cbx=>{
          cbx.checked = data.status.includes(cbx.value);
        });
      }
    });
  });
});
function copyFirstTechTimeInMachine(machine){
  const techs = machine.querySelectorAll(".tech-checkbox");
  if(techs.length === 0) return;

  const firstTc = techs[0];

  // ถ้ายังไม่มีเวลา ไม่ต้อง copy
  const startInput = firstTc.querySelector('input[name^="start_"]');
  const endInput = firstTc.querySelector('input[name^="end_"]');
  if(!startInput.value || !endInput.value) return;

  const startVal = startInput.value;
  const endVal = endInput.value;

  techs.forEach(tc=>{
    if(tc === firstTc) return;
    const empCode = tc.querySelector('input[name="ช่างผู้รับผิดชอบ"]').value;
    tc.querySelector(`input[name="start_${empCode}"]`).value = startVal;
    tc.querySelector(`input[name="end_${empCode}"]`).value = endVal;
  });
}


function copyFirstTechTimeInMachine(machine){
  const techs = machine.querySelectorAll(".tech-checkbox");
  if(techs.length === 0) return;

  const firstTc = techs[0];
  const startVal = firstTc.querySelector('input[name^="start_"]').value;
  const endVal = firstTc.querySelector('input[name^="end_"]').value;

  techs.forEach(tc=>{
    if(tc === firstTc) return;
    const empCode = tc.querySelector('input[name="ช่างผู้รับผิดชอบ"]').value;
    tc.querySelector(`input[name="start_${empCode}"]`).value = startVal;
    tc.querySelector(`input[name="end_${empCode}"]`).value = endVal;
  });
}

  // Autocomplete รายชื่อเครื่อง
  const searchInput = div.querySelector(".machineSearch");
  const ul = div.querySelector(".machineList");
  const hiddenInput = div.querySelector(".machineCodeHidden");
  searchInput.addEventListener("input", ()=>{
    const val=searchInput.value.toLowerCase();
    const filtered = machineList.filter(m=>
      m.DeptCode===$("deptCodeHidden").value &&
      (m["รายชื่อเครื่องจักร1"]||"").toLowerCase().includes(val)
    );
    ul.innerHTML="";
    filtered.forEach(m=>{
      const li=document.createElement("li");
      li.textContent = m["รายชื่อเครื่องจักร1"];
      li.dataset.code = m["รหัสเครื่อง"];
      li.className="px-3 py-1 hover:bg-blue-100 cursor-pointer";
      li.onclick=()=>{
        searchInput.value=li.textContent;
        hiddenInput.value=li.dataset.code;
        ul.classList.add("hidden");
      };
      ul.appendChild(li);
    });
    ul.classList.toggle("hidden", filtered.length===0);
  });

  return div;
}

// ----- คัดลอกเวลาและ Checkbox จากเครื่องแรกไปทุกเครื่อง ----- //
function copyFirstMachineTechToAllMachines(){
  const machines = document.querySelectorAll(".machine-container");
  if(machines.length < 2) return;

  const firstMachine = machines[0];
  const firstTechs = firstMachine.querySelectorAll(".tech-checkbox");

  machines.forEach((machine, idx) => {
    if(idx === 0) return; // skip เครื่องแรก
    const techs = machine.querySelectorAll(".tech-checkbox");
    techs.forEach(tc => {
      const empCode = tc.querySelector('input[name="ช่างผู้รับผิดชอบ"]').value;
      const firstTc = Array.from(firstTechs).find(f => 
        f.querySelector('input[name="ช่างผู้รับผิดชอบ"]').value === empCode
      );
      if(firstTc){
        // คัดลอก checkbox
        tc.querySelector('input[name="ช่างผู้รับผิดชอบ"]').checked =
          firstTc.querySelector('input[name="ช่างผู้รับผิดชอบ"]').checked;
        // คัดลอก start/end ถ้ามีกรอก
        const startVal = firstTc.querySelector(`input[name="start_${empCode}"]`).value;
        const endVal = firstTc.querySelector(`input[name="end_${empCode}"]`).value;
        if(startVal) tc.querySelector(`input[name="start_${empCode}"]`).value = startVal;
        if(endVal) tc.querySelector(`input[name="end_${empCode}"]`).value = endVal;
      }
    });
  });
}

// เรียกใช้เมื่อมีการเปลี่ยนค่าในเครื่องแรก
document.addEventListener("change", e => {
  const machines = document.querySelectorAll(".machine-container");
  if(machines.length === 0) return;
  if(e.target.closest(".machine-container") === machines[0]){
    copyFirstMachineTechToAllMachines();
  }
});


// ------- Department search -------
$("deptSearch").addEventListener("input", e=>{
  const val=e.target.value.toLowerCase();
  const ul=$("deptList");
  ul.innerHTML="";
  deptList
    .filter(d=>`${d.NickName||""} : ${d.DeptName||""}`.toLowerCase().includes(val))
    .forEach(d=>{
      const li=document.createElement("li");
      li.textContent=`${d.NickName} : ${d.DeptName}`;
      li.dataset.code=d.DeptCode;
      li.className="px-3 py-1 hover:bg-blue-100 cursor-pointer";
      li.onclick=()=>{
        $("deptSearch").value=li.textContent;
        $("deptCodeHidden").value=li.dataset.code;
        ul.classList.add("hidden");
        $("pmGroupSearch").disabled=false;

        // 🕒 บันทึกเวลาเริ่มหลังจากเลือกหน่วยงาน
        deptSelectStartTime = new Date();
      };
      ul.appendChild(li);
    });
  $("deptList").classList.remove("hidden");
});

  const machines = document.querySelectorAll(".machine-container");
  if(machines.length < 2) return;

  const firstMachine = machines[0];
  const firstTechs = firstMachine.querySelectorAll(".tech-checkbox");

  machines.forEach((machine, idx) => {

    const techs = machine.querySelectorAll(".tech-checkbox");
    techs.forEach(tc => {

      const firstTc = Array.from(firstTechs).find(f =>

      );
      if(firstTc){
        tc.querySelector('input[name="ช่างผู้รับผิดชอบ"]').checked =
          firstTc.querySelector('input[name="ช่างผู้รับผิดชอบ"]').checked;
        tc.querySelector(`input[name="start_${empCode}"]`).value =
          firstTc.querySelector(`input[name="start_${empCode}"]`).value;
        tc.querySelector(`input[name="end_${empCode}"]`).value =
          firstTc.querySelector(`input[name="end_${empCode}"]`).value;
      }
    });
  });
}

// ------- PM Group search -------
$("pmGroupSearch").addEventListener("input", ()=>{
  if(!$("deptCodeHidden").value){
    alert("กรุณาเลือกหน่วยงานก่อน");
    $("pmGroupSearch").value="";
    return;
  }
  const val=$("pmGroupSearch").value.toLowerCase();
  const ul=$("pmGroupList");
  ul.innerHTML="";
  groupList
    .filter(g=>g.DeptCode===$("deptCodeHidden").value && (g.GroupName||"").toLowerCase().includes(val))
    .forEach(g=>{
      const li=document.createElement("li");
      li.textContent=g.GroupName;
      li.dataset.code=g.GroupCode;
      li.className="px-3 py-1 hover:bg-blue-100 cursor-pointer";
      li.onclick=()=>{
        $("pmGroupSearch").value=li.textContent;
            // --- เพิ่มบรรทัดนี้ลงไป ---
    $("groupCodeHidden").value = li.dataset.code;
   
        ul.classList.add("hidden");

        const machinesInGroup = machineList.filter(m=>
          m.GroupCode==li.dataset.code && m.DeptCode===$("deptCodeHidden").value
        );
        $("machinesContainer").innerHTML="";

        // 🕒 ฟังก์ชันเวลาไทย (GMT+7)
        function formatDateLocal(date) {
          const tzOffset = 7 * 60; // +7 ชั่วโมง
          const local = new Date(date.getTime() + tzOffset * 60000);
          return local.toISOString().slice(0, 16);
        }

        let prevEndTime = new Date();
        machinesInGroup.forEach(m=>{
          const row = createMachineRow();

          const pmMinutes = parseInt(m.PmTime) || 10;
          const startStr = formatDateLocal(prevEndTime);
          const endTime = new Date(prevEndTime.getTime() + pmMinutes * 60000);
          const endStr = formatDateLocal(endTime);
          prevEndTime = endTime;

          row.querySelector(".machineSearch").value = m["รายชื่อเครื่องจักร1"];
          row.querySelector(".machineCodeHidden").value = m["รหัสเครื่อง"];
          row.querySelector('textarea[name="รายละเอียดอาการเสีย"]').value =
            m["รายละเอียดอาการเสีย"] || "PM ทำความสะอาด";
          row.querySelector('textarea[name="วิเคราะห์สาเหตุ"]').value =
            m["วิเคราะห์สาเหตุ"] || "ตามกำหนด PM";

          row.querySelectorAll(".tech-checkbox").forEach(tc=>{
            const empCode = tc.querySelector('input[name="ช่างผู้รับผิดชอบ"]').value;
            // ถ้าอยากเติม start/end อัตโนมัติเปิดสองบรรทัดนี้

// ------- แปลง "วินาที" เป็น HH:MM:SS สำหรับ Time -------
function secondsToTimeStr(seconds) {
  if (seconds == null) return null;
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  const hh = h.toString().padStart(2, '0');
  const mm = m.toString().padStart(2, '0');
  const ss = s.toString().padStart(2, '0');
  return `${hh}:${mm}:${ss}`;
}

// แปลง Date → HH:MM:SS
function toTimeStr(date){
  if(!date) return null;
  const h = String(date.getHours()).padStart(2,'0');
  const m = String(date.getMinutes()).padStart(2,'0');
  const s = String(date.getSeconds()).padStart(2,'0');
  return `${h}:${m}:${s}`;
}


// แปลง Date → เวลาไทยสำหรับ datetime-local ของ AppSheet
function toThaiDateTimeLocalStr(date){
  if(!date) return null;
  // เพิ่ม GMT+7
  const localDate = new Date(date.getTime() + 7*60*60*1000);
  const yyyy = localDate.getFullYear();
  const mm = String(localDate.getMonth()+1).padStart(2,'0');
  const dd = String(localDate.getDate()).padStart(2,'0');
  const hh = String(localDate.getHours()).padStart(2,'0');
  const min = String(localDate.getMinutes()).padStart(2,'0');
  return `${yyyy}-${mm}-${dd}T${hh}:${min}`;
}

$("repairForm").addEventListener("submit", async e=>{
  e.preventDefault();

  // เช็คว่ามีเครื่องจักรถูกเพิ่มหรือยัง
  if (document.querySelectorAll(".machine-container").length === 0) {
    alert("กรุณาเพิ่มรายชื่อเครื่องจักรก่อนบันทึกข้อมูล");

  }

  // 🕒 คำนวณเวลาตั้งแต่เลือกหน่วยงานจนกดบันทึก (วินาที)
  let useSeconds = null;
  if (deptSelectStartTime) {
    const now = new Date();

  const submitBtn=$("submitBtn");

    const dept = $("deptCodeHidden").value;

          start: machine.querySelector(`input[name="start_${code}"]`).value,
          end: machine.querySelector(`input[name="end_${code}"]`).value,

                    .map(c=>c.value).join(",")

      });

      const parts = [...machine.querySelectorAll(".parts-row")].map((p, idx)=>({
        Seq: idx+1,
        รายการอะไหล่: p.querySelector('input[name="รายการอะไหล่"]').value,
        จำนวน: p.querySelector('input[name="จำนวน"]').value,
        หน่วย: p.querySelector('input[name="หน่วย"]').value
      }));

      // rows สำหรับ RepairTechnicians
      techs.forEach(t=>{
        techniciansRows.push({
          "เลขที่ใบแจ้งซ่อม": reqNum,
          "หน่วยงาน": dept,
    // --- เพิ่มบรรทัดนี้ครับ ---
    "GroupCode": $("groupCodeHidden").value,

          "รหัสเครื่อง": machineCode,
          "EmpCode": t.EmpCode,
          "รายละเอียดอาการเสีย": detail,
          "วิเคราะห์สาเหตุ": cause,
          "การแก้ไขความคิดเห็น": t.comment,
          "เวลาเริ่ม": t.start,
          "เวลาจบ": t.end,
          "สถานะของงานช่าง": t.status,
    "StartBeforeSave": toTimeStr(deptSelectStartTime),
    "EndBeforeSave": toTimeStr(new Date()),
    "TimeBeforeSave": useSeconds != null ? secondsToTimeStr(useSeconds) : null
        });
      });

      // หา EmpCode ของช่างคนแรก (เอาไปผูกกับอะไหล่)
      const firstTech = machine.querySelector('input[name="ช่างผู้รับผิดชอบ"]:checked');
      const empCode = firstTech ? firstTech.value : "";

      // rows สำหรับ RepairParts
      parts.forEach(p=>{
        partsRows.push({
          "เลขที่ใบแจ้งซ่อม": reqNum,
          "รหัสเครื่อง": machineCode,
          "EmpCode": empCode,
          "Seq": p.Seq,
          "รายการอะไหล่": p["รายการอะไหล่"],
          "จำนวน": p["จำนวน"],
          "หน่วย": p["หน่วย"]

    });

    // Push to AppSheet RepairTechnicians
    await fetch(`${apiBase}RepairTechnicians/Batch`,{
      method:"POST",
      headers:{"Content-Type":"application/json","ApplicationAccessKey":apiKey},
      body: JSON.stringify({Action:"Add",Rows:techniciansRows})
    });

    // Push to AppSheet RepairParts
    await fetch(`${apiBase}RepairParts/Batch`,{
      method:"POST",
      headers:{"Content-Type":"application/json","ApplicationAccessKey":apiKey},
      body: JSON.stringify({Action:"Add",Rows:partsRows})
    });

    alert("บันทึกสำเร็จ ✅");
    $("repairForm").reset();
    $("machinesContainer").innerHTML="";
    generateNextRequestNumber();
    deptSelectStartTime = null; // เคลียร์เวลา
  }catch(err){
    console.error(err);
    alert("เกิดข้อผิดพลาดในการบันทึก ❌\nดูใน Console เพิ่มเติมได้");
  } finally{

window.addEventListener('load', async function() {
    // 1. ดึงค่าจาก URL ?dept=A01&groupName=เครื่องจักร1
    const params = new URLSearchParams(window.location.search);
    const deptCodeParam = params.get('dept');         
    const groupNameParam = params.get('groupName');  

    // รอจนกว่า Master Data (deptList, groupList) จะโหลดเสร็จ
    let retryCount = 0;
    while ((deptList.length === 0 || groupList.length === 0) && retryCount < 20) {
        await new Promise(r => setTimeout(r, 500));
        retryCount++;
    }

    // 2. จัดการเรื่อง หน่วยงาน (Department)
    if (deptCodeParam) {
        const deptObj = deptList.find(d => String(d.DeptCode) === String(deptCodeParam));
        if (deptObj) {
            // กรอกชื่อแผนกในรูปแบบ IT : คอมพิวเตอร์ ลงในช่องค้นหา
            $("deptSearch").value = `${deptObj.NickName} : ${deptObj.DeptName}`;
            // เก็บค่า Code จริงไว้ใน Hidden Input
            $("deptCodeHidden").value = deptObj.DeptCode;
            // เปิดให้ช่องเลือกกลุ่ม PM ทำงานได้
            $("pmGroupSearch").disabled = false;
            // บันทึกเวลาเริ่ม
            deptSelectStartTime = new Date();
        }
    }

    // 3. จัดการเรื่อง กลุ่มเครื่องจักร (PM Group)
    if (groupNameParam && $("deptCodeHidden").value) {
        // หาข้อมูลกลุ่มจากชื่อที่ส่งมา และต้องเป็นแผนกเดียวกัน
        const groupObj = groupList.find(g => 
            String(g.GroupName) === String(groupNameParam) && 
            String(g.DeptCode) === String($("deptCodeHidden").value)
        );

        if (groupObj) {
            // กรอกชื่อกลุ่มลงในช่องค้นหา
            $("pmGroupSearch").value = groupObj.GroupName;
        // --- เพิ่มบรรทัดนี้เพื่อเก็บ Code จริงไว้บันทึก ---
    $("groupCodeHidden").value = groupObj.GroupCode;
            // จำลองเหตุการณ์การเลือก (Trigger Logic เลือกเครื่องจักรในกลุ่ม)
            // โดยการดึงเครื่องจักรทั้งหมดในกลุ่มนั้นมาสร้างรายการด้านล่าง
            const machinesInGroup = machineList.filter(m =>
                String(m.GroupCode) === String(groupObj.GroupCode) && 
                String(m.DeptCode) === String($("deptCodeHidden").value)
            );

            $("machinesContainer").innerHTML = "";

            function formatDateLocal(date) {
                const tzOffset = 7 * 60; 
                const local = new Date(date.getTime() + tzOffset * 60000);
                return local.toISOString().slice(0, 16);
            }

            let prevEndTime = new Date();
            machinesInGroup.forEach(m => {
                const row = createMachineRow();
                const pmMinutes = parseInt(m.PmTime) || 10;
                const endTime = new Date(prevEndTime.getTime() + pmMinutes * 60000);
                prevEndTime = endTime;

                row.querySelector(".machineSearch").value = m["รายชื่อเครื่องจักร1"];
                row.querySelector(".machineCodeHidden").value = m["รหัสเครื่อง"];
                row.querySelector('textarea[name="รายละเอียดอาการเสีย"]').value = m["รายละเอียดอาการเสีย"] || "PM ทำความสะอาด";
                row.querySelector('textarea[name="วิเคราะห์สาเหตุ"]').value = m["วิเคราะห์สาเหตุ"] || "ตามกำหนด PM";

                row.querySelectorAll(".tech-checkbox").forEach(tc => {
                    const empCode = tc.querySelector('input[name="ช่างผู้รับผิดชอบ"]').value;
                    tc.querySelectorAll(`input[name="status_${empCode}"]`).forEach(cbx => {
                        cbx.checked = (cbx.value === "จบงาน");
                    });
                    // ใส่ความคิดเห็นเริ่มต้นจากกลุ่ม (ถ้ามี)
                    tc.querySelector(`textarea[name="comment_${empCode}"]`).value = groupObj["การแก้ไขความคิดเห็น"] || "";
                });

                $("machinesContainer").appendChild(row);
            });
        }
    }
});
