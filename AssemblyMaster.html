<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Assembly Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; padding: 20px; display: flex; justify-content: center; font-family: 'Inter', system-ui, sans-serif; }
        .main-card { width: 100%; max-width: 450px; background: white; padding: 24px; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
        .active-add { background: #2563eb !important; color: white !important; }
        .active-edit { background: #eab308 !important; color: white !important; }
        
        #dropdownContainer { position: absolute; width: 100%; max-height: 200px; overflow-y: auto; background: white; border: 1px solid #e2e8f0; border-radius: 16px; display: none; z-index: 50; margin-top: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .dropdown-item { padding: 10px 16px; cursor: pointer; font-size: 14px; color: #475569; border-bottom: 1px solid #f8fafc; }
        .dropdown-item:hover { background-color: #f1f5f9; }
        
        .report-section { margin-top: 40px; }
        .report-table { width: 100%; margin-top: 15px; font-size: 12px; }
        .report-table th { color: #94a3b8; padding-bottom: 8px; border-bottom: 1px solid #e2e8f0; text-align: left; }
        .report-table td { padding: 10px 0; color: #334155; border-bottom: 1px solid #f8fafc; }
    </style>
</head>
<body>

    <div class="main-card">
        <h1 class="text-xl font-bold text-center mb-6 text-slate-800">Assembly Manager</h1>
        
        <div class="flex bg-slate-100 p-1 rounded-xl mb-6">
            <button id="btnModeAdd" onclick="setMode('add')" class="flex-1 py-2 rounded-lg font-bold text-[11px] text-slate-600 transition active-add">➕ เพิ่มใหม่</button>
            <button id="btnModeEdit" onclick="setMode('edit')" class="flex-1 py-2 rounded-lg font-bold text-[11px] text-slate-600 transition">✎ แก้ไข</button>
        </div>

        <div class="relative space-y-3">
            <input type="text" id="assemblySearch" placeholder="🔍 ค้นหา ItemCode..." class="w-full border-2 border-slate-100 p-3 rounded-xl outline-none focus:border-blue-400" oninput="handleSearch(this.value)" onfocus="toggleDropdown(true)">
            <div id="dropdownContainer"></div>
            
            <input type="text" id="locationInput" placeholder="📍 ระบุ Location..." class="w-full border-2 border-slate-100 p-3 rounded-xl outline-none focus:border-blue-400" onkeydown="if(event.key==='Enter') processAndSave()">
            
            <div id="message" class="hidden w-full py-3 rounded-xl font-bold text-center text-[12px]"></div>
        </div>

        <div class="report-section">
            <h2 class="text-[10px] font-bold text-slate-400 uppercase mb-2">รายการล่าสุด</h2>
            <input type="text" placeholder="🔍 กรองตารางรายงาน..." class="w-full border border-slate-200 p-2 rounded-lg text-sm bg-slate-50 outline-none focus:border-blue-300 mb-2" oninput="renderReport(this.value)">
            <table class="report-table">
                <thead><tr><th>ItemCode</th><th>Location</th></tr></thead>
                <tbody id="reportBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const appId = "ae5d7dce-1c12-4c53-b201-5a2d7c5b5411";
        const apiKey = "V2-b1wGR-Nj1SR-0MhEx-QWCHT-Mllly-cZnc9-PHCAK-r1f85";
        let mode = 'add';
        let isProcessing = false;
        let masterRecords = [], productCodes = [];

        async function init() {
            const [resMaster, resProduct] = await Promise.all([
                fetch(`https://api.appsheet.com/api/v2/apps/${appId}/tables/AssemblyMaster/Find`, { method: "POST", headers: { "ApplicationAccessKey": apiKey, "Content-Type": "application/json" }, body: JSON.stringify({ Action: "Find", Rows: [] }) }),
                fetch(`https://api.appsheet.com/api/v2/apps/${appId}/tables/PoductCode/Find`, { method: "POST", headers: { "ApplicationAccessKey": apiKey, "Content-Type": "application/json" }, body: JSON.stringify({ Action: "Find", Rows: [] }) })
            ]);
            masterRecords = await resMaster.json();
            productCodes = (await resProduct.json()).map(r => r.Id_AssemblyMaster?.toString());
            renderReport();
        }

        function renderReport(filter = "") {
            const filtered = masterRecords.filter(r => r.AssemblyMasterNew?.toLowerCase().includes(filter.toLowerCase()));
            document.getElementById('reportBody').innerHTML = filtered.slice(-10).reverse().map(r => 
                `<tr><td class="font-bold">${r.AssemblyMasterNew}</td><td class="text-blue-600">${r.Location}</td></tr>`
            ).join('');
        }

        function showMsg(text, isError = false) {
            const msg = document.getElementById('message');
            msg.innerText = text;
            msg.className = `w-full py-3 rounded-xl font-bold text-center text-[12px] ${isError ? 'bg-red-50 text-red-600' : 'bg-emerald-50 text-emerald-600'}`;
            msg.classList.remove('hidden');
        }

        async function processAndSave() {
            if (isProcessing) return;
            const name = document.getElementById('assemblySearch').value.trim();
            const loc = document.getElementById('locationInput').value.trim();
            
            if (mode === 'add' && !productCodes.includes(name)) {
                showMsg("❌ ไม่พบรหัสนี้ในตาราง PoductCode!", true);
                return;
            }

            const foundRow = masterRecords.find(r => r.AssemblyMasterNew?.toLowerCase() === name.toLowerCase());
            if (mode === 'edit' && !foundRow) { showMsg("❌ ไม่พบรายการนี้เพื่อแก้ไข!", true); return; }
            if (mode === 'add' && foundRow) { showMsg("❌ รายการนี้มีอยู่แล้ว!", true); return; }

            isProcessing = true;
            showMsg("⏳ กำลังบันทึก...");

            try {
                await fetch(`https://api.appsheet.com/api/v2/apps/${appId}/tables/AssemblyMaster/Action`, {
                    method: "POST", headers: { "ApplicationAccessKey": apiKey, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "Action": (mode === 'edit') ? "Edit" : "Add",
                        "Rows": [{ "id": (foundRow ? foundRow.id : Date.now().toString()), "AssemblyMasterNew": name, "Location": loc }]
                    })
                });
                showMsg("✅ บันทึกสำเร็จ!");
                setTimeout(() => location.reload(), 1000);
            } catch (e) { showMsg("❌ บันทึกไม่ได้!", true); isProcessing = false; }
        }

        function setMode(m) {
            mode = m;
            document.getElementById('btnModeAdd').classList.toggle('active-add', m === 'add');
            document.getElementById('btnModeEdit').classList.toggle('active-edit', m === 'edit');
        }

        function handleSearch(val) {
            const container = document.getElementById('dropdownContainer');
            const source = (mode === 'add') ? productCodes : masterRecords.map(r => r.AssemblyMasterNew);
            const filtered = source.filter(i => i && i.toLowerCase().includes(val.toLowerCase()));
            container.innerHTML = filtered.map(i => `<div class="dropdown-item" onclick="selectItem('${i}')">${i}</div>`).join('');
            container.style.display = filtered.length > 0 ? 'block' : 'none';
        }

        function selectItem(name) {
            const found = masterRecords.find(r => r.AssemblyMasterNew === name);
            document.getElementById('assemblySearch').value = name;
            if (found) document.getElementById('locationInput').value = found.Location || "";
            toggleDropdown(false);
        }
        
        function toggleDropdown(show) { document.getElementById('dropdownContainer').style.display = show ? 'block' : 'none'; }

        init();
    </script>
</body>
</html>
