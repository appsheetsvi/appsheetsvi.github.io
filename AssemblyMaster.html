<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Assembly Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; padding: 20px; display: flex; justify-content: center; font-family: sans-serif; }
        .main-card { width: 100%; max-width: 500px; background: white; padding: 24px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .active-add { background: #2563eb; color: white; }
        .active-edit { background: #eab308; color: white; }
        #toast { position: fixed; top: 20px; right: 20px; padding: 16px 24px; background: #16a34a; color: white; border-radius: 12px; z-index: 9999; display: none; font-weight: bold; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        #dropdownContainer { position: absolute; width: calc(100% - 48px); max-height: 200px; overflow-y: auto; background: white; border: 1px solid #e5e7eb; border-radius: 12px; display: none; z-index: 50; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .dropdown-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #f9fafb; font-size: 14px; }
        .dropdown-item:hover { background-color: #eff6ff; }
    </style>
</head>
<body>

    <div id="toast">✅ บันทึกข้อมูลสำเร็จ!</div>

    <div class="main-card">
        <h2 class="text-xl font-bold text-center mb-6">Assembly Manager</h2>
        
        <div class="mb-6 text-center bg-blue-50 py-2 rounded-xl border border-blue-100">
            <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">รายการที่บันทึกแล้ว</span>
            <div id="counter" class="text-xl font-black text-blue-600">0</div>
        </div>

        <div class="flex bg-gray-100 p-1 rounded-xl mb-6">
            <button id="btnModeAdd" onclick="setMode('add')" class="flex-1 py-2 rounded-lg font-bold text-sm active-add">➕ เพิ่มใหม่</button>
            <button id="btnModeEdit" onclick="setMode('edit')" class="flex-1 py-2 rounded-lg font-bold text-sm">✎ แก้ไข</button>
        </div>

        <div class="relative space-y-4">
            <div class="relative">
                <input type="text" id="assemblySearch" placeholder="🔍 เลือกหรือพิมพ์ ItemCode..." 
                       class="w-full border-2 p-4 rounded-xl text-sm outline-none pr-10" 
                       oninput="handleSearch(this.value)" onfocus="toggleDropdown(true)"
                       onkeydown="if(event.key==='Enter'){ event.preventDefault(); toggleDropdown(false); document.getElementById('locationInput').focus(); }">
                <span class="absolute right-4 top-4 text-gray-400 pointer-events-none">▼</span>
                <div id="dropdownContainer"></div>
            </div>
            
            <input type="text" id="locationInput" placeholder="📍 ระบุ Location แล้วกด Enter เพื่อบันทึก..." 
                   class="w-full border-2 p-4 rounded-xl text-sm outline-none"
                   onkeydown="if(event.key==='Enter'){ event.preventDefault(); toggleDropdown(false); processAndSave(); }">
        </div>
    </div>

    <script>
        const appId = "ae5d7dce-1c12-4c53-b201-5a2d7c5b5411";
        const apiKey = "V2-b1wGR-Nj1SR-0MhEx-QWCHT-Mllly-cZnc9-PHCAK-r1f85";
        let mode = 'add';
        let productCodes = []; 
        let masterRecords = []; 
        let recordCount = 0;

        async function init() {
            const [resProduct, resMaster] = await Promise.all([
                fetch(`https://api.appsheet.com/api/v2/apps/${appId}/tables/PoductCode/Find`, { method: "POST", headers: { "ApplicationAccessKey": apiKey, "Content-Type": "application/json" }, body: JSON.stringify({ Action: "Find", Properties: { "Locale": "en-US" }, Rows: [] }) }),
                fetch(`https://api.appsheet.com/api/v2/apps/${appId}/tables/AssemblyMaster/Find`, { method: "POST", headers: { "ApplicationAccessKey": apiKey, "Content-Type": "application/json" }, body: JSON.stringify({ Action: "Find", Properties: { "Locale": "en-US" }, Rows: [] }) })
            ]);
            productCodes = (await resProduct.json()).map(r => r.Id_AssemblyMaster);
            masterRecords = await resMaster.json();
            recordCount = masterRecords.length;
            document.getElementById('counter').innerText = recordCount;
        }

        async function processAndSave() {
            const name = document.getElementById('assemblySearch').value.trim();
            const loc = document.getElementById('locationInput').value.trim();
            if(!name || !loc) return;

            // เตรียมค่าสำหรับส่งไปบันทึก
            const now = new Date().toLocaleString("sv-SE"); // ได้รูปแบบ YYYY-MM-DD HH:MM:SS
            const newId = Date.now().toString().slice(-6); // สร้าง ID สั้นๆ จากเวลา

            const resMaster = await fetch(`https://api.appsheet.com/api/v2/apps/${appId}/tables/AssemblyMaster/Find`, { method: "POST", headers: { "ApplicationAccessKey": apiKey, "Content-Type": "application/json" }, body: JSON.stringify({ Action: "Find", Properties: { "Locale": "en-US" }, Rows: [] }) });
            const latestMaster = await resMaster.json();
            const foundRow = latestMaster.find(r => r.AssemblyMasterNew.trim().toLowerCase() === name.toLowerCase());

            const isUpdate = (mode === 'edit' && foundRow);
            const action = isUpdate ? "Edit" : "Add";
            
            // ส่งค่า id และ Datemodified ไปด้วยทุกครั้ง
            const row = isUpdate 
                ? { "_ComputedKey": foundRow._ComputedKey, "AssemblyMasterNew": name, "Location": loc, "Datemodified": now } 
                : { "id": newId, "AssemblyMasterNew": name, "Location": loc, "Datemodified": now };

            await fetch(`https://api.appsheet.com/api/v2/apps/${appId}/tables/AssemblyMaster/Action`, {
                method: "POST", headers: { "ApplicationAccessKey": apiKey, "Content-Type": "application/json" },
                body: JSON.stringify({ "Action": action, "Properties": { "Locale": "en-US" }, "Rows": [row] })
            });

            if (!isUpdate) {
                recordCount++;
                document.getElementById('counter').innerText = recordCount;
                masterRecords.push({ AssemblyMasterNew: name, Location: loc });
            }

            document.getElementById('toast').style.display = 'block';
            document.getElementById('assemblySearch').value = "";
            document.getElementById('locationInput').value = "";
            toggleDropdown(false);

            setTimeout(() => document.getElementById('toast').style.display = 'none', 2000);
            document.getElementById('assemblySearch').focus();
        }

        function handleSearch(val) {
            filterDropdown(val);
            const found = masterRecords.find(r => r.AssemblyMasterNew.trim().toLowerCase() === val.trim().toLowerCase());
            if (found) document.getElementById('locationInput').value = found.Location;
        }

        function setMode(m) {
            mode = m;
            document.getElementById('btnModeAdd').className = (m === 'add') ? 'flex-1 py-2 rounded-lg font-bold text-sm active-add' : 'flex-1 py-2 rounded-lg font-bold text-sm';
            document.getElementById('btnModeEdit').className = (m === 'edit') ? 'flex-1 py-2 rounded-lg font-bold text-sm active-edit' : 'flex-1 py-2 rounded-lg font-bold text-sm';
        }

        function toggleDropdown(show) { document.getElementById('dropdownContainer').style.display = show ? 'block' : 'none'; }

        function filterDropdown(keyword) {
            const container = document.getElementById('dropdownContainer');
            container.innerHTML = "";
            const options = (mode === 'add') ? productCodes : masterRecords.map(r => r.AssemblyMasterNew);
            const filtered = [...new Set(options)].filter(i => i && i.toLowerCase().includes(keyword.toLowerCase()));
            filtered.forEach(i => {
                const div = document.createElement('div');
                div.className = 'dropdown-item';
                div.innerText = i;
                div.onclick = () => {
                    document.getElementById('assemblySearch').value = i;
                    handleSearch(i);
                    toggleDropdown(false);
                };
                container.appendChild(div);
            });
            container.style.display = filtered.length > 0 ? 'block' : 'none';
        }

        init();
    </script>
</body>
</html>
