<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Assembly Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .scroll-area { height: 150px; overflow-y: auto; border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; margin-top: 10px; background: #fafafa; }
        .item-card { padding: 8px 12px; background: white; border: 1px solid #dbeafe; border-radius: 6px; display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; }
    </style>
</head>
<body class="bg-gray-100 p-6">

    <div class="max-w-lg mx-auto bg-white p-6 rounded-2xl shadow-xl border border-gray-100">
        <h2 class="text-sm font-bold text-gray-700 mb-4 uppercase">🔍 ค้นหาจาก PoductCode และบันทึกลง AssemblyMaster</h2>
        
        <div id="statusMsg" class="text-xs text-blue-500 mb-4">กำลังโหลดข้อมูล...</div>

        <input type="text" id="assemblySearch" list="assemblyList" placeholder="ค้นหา Id_AssemblyMaster..." 
               autocomplete="off" class="w-full border p-3 rounded-lg text-sm mb-2 outline-none focus:ring-2 focus:ring-blue-400">
        <datalist id="assemblyList"></datalist>
        
        <input type="text" id="locationInput" placeholder="ระบุ Location..." 
               class="w-full border p-3 rounded-lg text-sm mb-4 outline-none focus:ring-2 focus:ring-blue-400">
        
        <button onclick="addItem()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold text-sm hover:bg-blue-700 transition">เพิ่มลงรายการ</button>

        <h2 class="text-sm font-bold text-gray-700 mt-6 mb-2 uppercase">📋 รายการที่เตรียมบันทึก</h2>
        <div id="selectedList" class="scroll-area"></div>
        
        <button onclick="saveList()" class="w-full mt-4 bg-green-600 text-white p-3 rounded-lg font-bold hover:bg-green-700 shadow-lg transition">💾 บันทึกลงตาราง AssemblyMaster</button>
    </div>

    <script>
        const appId = "ae5d7dce-1c12-4c53-b201-5a2d7c5b5411";
        const apiKey = "V2-b1wGR-Nj1SR-0MhEx-QWCHT-Mllly-cZnc9-PHCAK-r1f85";
        
        let assemblyData = []; 
        let selectedItems = [];   

        // 1. ดึงข้อมูลจาก PoductCode เพื่อทำระบบแนะนำ (ค้นหาเท่านั้น ห้ามแก้ไข)
        async function init() {
            const status = document.getElementById('statusMsg');
            try {
                const res = await fetch(`https://api.appsheet.com/api/v2/apps/${appId}/tables/PoductCode/Find`, {
                    method: "POST",
                    headers: { "ApplicationAccessKey": apiKey, "Content-Type": "application/json" },
                    body: JSON.stringify({ Action: "Find", Properties: { "Locale": "en-US" }, Rows: [] })
                });
                const data = await res.json();
                const rows = Array.isArray(data) ? data : (data.Rows || []);
                
                assemblyData = [...new Set(rows.map(r => r.Id_AssemblyMaster).filter(v => v))];
                status.innerText = `พร้อมใช้งาน (ค้นหาจาก PoductCode: ${assemblyData.length} รายการ)`;
                status.className = "text-xs text-green-600 mb-4";
            } catch (e) { status.innerText = "เชื่อมต่อฐานข้อมูลไม่ได้"; }
        }

        document.getElementById('assemblySearch').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase();
            const dataList = document.getElementById('assemblyList');
            dataList.innerHTML = "";
            if (keyword.length < 1) return;
            assemblyData.filter(i => i.toLowerCase().includes(keyword)).forEach(i => {
                const opt = document.createElement('option');
                opt.value = i;
                dataList.appendChild(opt);
            });
        });

        function addItem() {
            const name = document.getElementById('assemblySearch').value;
            const loc = document.getElementById('locationInput').value;
            if (!name || !loc) return alert("กรุณากรอกข้อมูลให้ครบ");
            selectedItems.push({ name, loc });
            renderSelected();
            document.getElementById('assemblySearch').value = "";
            document.getElementById('locationInput').value = "";
        }

        function renderSelected() {
            const container = document.getElementById('selectedList');
            container.innerHTML = "";
            selectedItems.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "item-card";
                div.innerHTML = `<span><b>${item.name}</b> ➡️ @${item.loc}</span>
                                 <button onclick="selectedItems.splice(${index},1); renderSelected()" class="text-red-500 font-bold">✕</button>`;
                container.appendChild(div);
            });
        }

        // 2. บันทึกข้อมูลลงตาราง AssemblyMaster
        async function saveList() {
            if (selectedItems.length === 0) return alert("ไม่มีรายการ!");
            
            for (const item of selectedItems) {
                await fetch(`https://api.appsheet.com/api/v2/apps/${appId}/tables/AssemblyMaster/Action`, {
                    method: "POST",
                    headers: { "ApplicationAccessKey": apiKey, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "Action": "Add",
                        "Properties": { "Locale": "en-US" },
                        "Rows": [{ 
                            "AssemblyMasterNew": item.name, 
                            "Location": item.loc 
                        }]
                    })
                });
            }
            alert("บันทึกสำเร็จ!");
            selectedItems = []; 
            renderSelected();
        }

        init();
    </script>
</body>
</html>
