<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assembly Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; display: flex; justify-content: center; padding: 20px; min-height: 100vh; }
        .main-container { width: 100%; max-width: 500px; background: white; padding: 24px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .scroll-area { height: 180px; overflow-y: auto; border: 1px solid #e5e7eb; padding: 12px; border-radius: 12px; margin-top: 12px; background: #f9fafb; }
        .item-card { padding: 12px; background: white; border: 1px solid #dbeafe; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 14px; }
        button { transition: all 0.2s ease; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="main-container">
        <h2 class="text-lg font-bold text-gray-800 mb-5 text-center">🔍 Assembly Manager</h2>
        
        <div id="statusMsg" class="text-xs text-blue-500 mb-4 text-center">กำลังเชื่อมต่อ...</div>

        <input type="text" id="assemblySearch" list="assemblyList" placeholder="ค้นหา Id_AssemblyMaster..." 
               class="w-full border p-3.5 rounded-xl text-sm mb-3 outline-none focus:ring-2 focus:ring-blue-500">
        <datalist id="assemblyList"></datalist>
        
        <input type="text" id="locationInput" placeholder="ระบุ Location..." 
               class="w-full border p-3.5 rounded-xl text-sm mb-4 outline-none focus:ring-2 focus:ring-blue-500">
        
        <button onclick="addItem()" class="w-full bg-blue-600 text-white p-3.5 rounded-xl font-bold hover:bg-blue-700 shadow-md">เพิ่มลงรายการ</button>

        <h2 class="text-sm font-bold text-gray-700 mt-8 mb-2 uppercase">📋 รายการเตรียมบันทึก</h2>
        <div id="selectedList" class="scroll-area"></div>
        
        <button onclick="saveList()" class="w-full mt-6 bg-green-600 text-white p-4 rounded-xl font-bold hover:bg-green-700 shadow-lg text-lg">💾 บันทึกข้อมูล</button>
    </div>

    <script>
        const appId = "ae5d7dce-1c12-4c53-b201-5a2d7c5b5411";
        const apiKey = "V2-b1wGR-Nj1SR-0MhEx-QWCHT-Mllly-cZnc9-PHCAK-r1f85";
        
        let assemblyData = []; 
        let selectedItems = [];   

        async function init() {
            try {
                const res = await fetch(`https://api.appsheet.com/api/v2/apps/${appId}/tables/PoductCode/Find`, {
                    method: "POST",
                    headers: { "ApplicationAccessKey": apiKey, "Content-Type": "application/json" },
                    body: JSON.stringify({ Action: "Find", Properties: { "Locale": "en-US" }, Rows: [] })
                });
                const data = await res.json();
                const rows = Array.isArray(data) ? data : (data.Rows || []);
                assemblyData = [...new Set(rows.map(r => r.Id_AssemblyMaster).filter(v => v))];
                document.getElementById('statusMsg').innerText = `พร้อมใช้งาน (${assemblyData.length} รายการ)`;
            } catch (e) { document.getElementById('statusMsg').innerText = "เชื่อมต่อไม่ได้"; }
        }

        document.getElementById('assemblySearch').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase();
            const dataList = document.getElementById('assemblyList');
            dataList.innerHTML = "";
            if (keyword.length < 1) return;
            assemblyData.filter(i => i.toLowerCase().includes(keyword)).forEach(i => {
                const opt = document.createElement('option');
                opt.value = i;
                dataList.appendChild(opt);
            });
        });

        function addItem() {
            const name = document.getElementById('assemblySearch').value;
            const loc = document.getElementById('locationInput').value;
            if (!name || !loc) return alert("กรุณากรอกข้อมูลให้ครบ");
            selectedItems.push({ name, loc });
            renderSelected();
            document.getElementById('assemblySearch').value = "";
            document.getElementById('locationInput').value = "";
        }

        function renderSelected() {
            const container = document.getElementById('selectedList');
            container.innerHTML = "";
            selectedItems.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "item-card";
                div.innerHTML = `<span><b>${item.name}</b> <br><small class="text-gray-500">Loc: ${item.loc}</small></span>
                                 <button onclick="selectedItems.splice(${index},1); renderSelected()" class="text-red-500 px-2 py-1 font-bold">✕</button>`;
                container.appendChild(div);
            });
        }

        async function saveList() {
            if (selectedItems.length === 0) return alert("ไม่มีรายการ!");
            for (const item of selectedItems) {
                await fetch(`https://api.appsheet.com/api/v2/apps/${appId}/tables/AssemblyMaster/Action`, {
                    method: "POST",
                    headers: { "ApplicationAccessKey": apiKey, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "Action": "Add",
                        "Properties": { "Locale": "en-US" },
                        "Rows": [{ "AssemblyMasterNew": item.name, "Location": item.loc }]
                    })
                });
            }
            alert("บันทึกสำเร็จ!");
            selectedItems = []; 
            renderSelected();
        }

        init();
    </script>
</body>
</html>
