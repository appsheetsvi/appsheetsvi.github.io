<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assembly Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; padding: 20px; display: flex; justify-content: center; }
        .main-card { width: 100%; max-width: 500px; background: white; padding: 24px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .list-container { max-height: 250px; overflow-y: auto; border: 1px solid #e5e7eb; border-radius: 12px; padding: 10px; background: #f9fafb; }
        .active-add { background: #2563eb; color: white; }
        .active-edit { background: #eab308; color: white; }
    </style>
</head>
<body>

    <div class="main-card">
        <h2 class="text-xl font-bold text-center mb-6">Assembly Manager</h2>

        <div class="flex bg-gray-100 p-1 rounded-xl mb-6">
            <button id="btnModeAdd" onclick="setMode('add')" class="flex-1 py-2 rounded-lg font-bold text-sm active-add">➕ เพิ่มใหม่</button>
            <button id="btnModeEdit" onclick="setMode('edit')" class="flex-1 py-2 rounded-lg font-bold text-sm">✎ แก้ไข</button>
        </div>

        <div class="space-y-4">
            <input type="text" id="assemblySearch" list="assemblyList" placeholder="🔍 ค้นหา ItemCode..." 
                   class="w-full border-2 p-4 rounded-xl text-sm outline-none" oninput="handleAutoFill()">
            <datalist id="assemblyList"></datalist>
            
            <input type="text" id="locationInput" placeholder="📍 ระบุ Location..." 
                   class="w-full border-2 p-4 rounded-xl text-sm outline-none">
            
            <button onclick="processAndSave()" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold shadow-lg">💾 บันทึกข้อมูลทันที</button>
        </div>

        <h3 class="text-xs font-bold text-gray-400 mt-6 mb-2 uppercase">📋 รายการล่าสุด (ประวัติบันทึก)</h3>
        <div id="historyList" class="list-container space-y-2"></div>
    </div>

    <script>
        const appId = "ae5d7dce-1c12-4c53-b201-5a2d7c5b5411";
        const apiKey = "V2-b1wGR-Nj1SR-0MhEx-QWCHT-Mllly-cZnc9-PHCAK-r1f85";
        
        let mode = 'add';
        let productCodes = []; 
        let masterRecords = []; 

        async function init() {
            const [resProduct, resMaster] = await Promise.all([
                fetch(`https://api.appsheet.com/api/v2/apps/${appId}/tables/PoductCode/Find`, { method: "POST", headers: { "ApplicationAccessKey": apiKey, "Content-Type": "application/json" }, body: JSON.stringify({ Action: "Find", Properties: { "Locale": "en-US" }, Rows: [] }) }),
                fetch(`https://api.appsheet.com/api/v2/apps/${appId}/tables/AssemblyMaster/Find`, { method: "POST", headers: { "ApplicationAccessKey": apiKey, "Content-Type": "application/json" }, body: JSON.stringify({ Action: "Find", Properties: { "Locale": "en-US" }, Rows: [] }) })
            ]);
            
            productCodes = (await resProduct.json()).map(r => r.Id_AssemblyMaster);
            masterRecords = await resMaster.json();
            updateDataList();
        }

        function updateDataList() {
            const list = document.getElementById('assemblyList');
            list.innerHTML = "";
            const options = (mode === 'add') ? productCodes : masterRecords.map(r => r.AssemblyMasterNew);
            [...new Set(options)].forEach(i => {
                const opt = document.createElement('option'); opt.value = i; list.appendChild(opt);
            });
        }

        function setMode(m) {
            mode = m;
            document.getElementById('btnModeAdd').className = (m === 'add') ? 'flex-1 py-2 rounded-lg font-bold text-sm active-add' : 'flex-1 py-2 rounded-lg font-bold text-sm';
            document.getElementById('btnModeEdit').className = (m === 'edit') ? 'flex-1 py-2 rounded-lg font-bold text-sm active-edit' : 'flex-1 py-2 rounded-lg font-bold text-sm';
            document.getElementById('locationInput').value = "";
            updateDataList();
        }

        function handleAutoFill() {
            if (mode === 'edit') {
                const search = document.getElementById('assemblySearch').value;
                const found = masterRecords.find(r => r.AssemblyMasterNew === search);
                if (found) document.getElementById('locationInput').value = found.Location;
            }
        }

        async function processAndSave() {
            const name = document.getElementById('assemblySearch').value;
            const loc = document.getElementById('locationInput').value;
            if (!name || !loc) return alert("กรุณากรอกข้อมูล");

            const foundRow = masterRecords.find(r => r.AssemblyMasterNew === name);
            const action = (mode === 'edit' && foundRow) ? "Edit" : "Add";
            const row = (action === "Edit") 
                ? { "_ComputedKey": foundRow._ComputedKey, "AssemblyMasterNew": name, "Location": loc }
                : { "AssemblyMasterNew": name, "Location": loc };

            await fetch(`https://api.appsheet.com/api/v2/apps/${appId}/tables/AssemblyMaster/Action`, {
                method: "POST", headers: { "ApplicationAccessKey": apiKey, "Content-Type": "application/json" },
                body: JSON.stringify({ "Action": action, "Properties": { "Locale": "en-US" }, "Rows": [row] })
            });

            // อัปเดต UI
            document.getElementById('historyList').insertAdjacentHTML('afterbegin', `
                <div class="bg-white p-2 rounded border text-xs shadow-sm">
                    <span class="font-bold text-green-600">บันทึกสำเร็จ:</span> ${name} 📍 ${loc}
                </div>
            `);
            
            document.getElementById('assemblySearch').value = "";
            document.getElementById('locationInput').value = "";
            alert("บันทึกเรียบร้อย!");
        }

        init();
    </script>
</body>
</html>
