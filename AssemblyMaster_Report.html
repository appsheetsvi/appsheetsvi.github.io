<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assembly Master Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Urbanist', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .slide-container { width: 1200px; height: 650px; background-color: #000; border-radius: 12px; border: 1px solid #1e293b; padding: 40px; display: flex; flex-direction: column; }
        .kpi-card { background: #1e293b; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
        .kpi-value { font-size: 32px; font-weight: 700; color: #3b82f6; }
        .table-wrapper { flex-grow: 1; overflow-y: auto; background: rgba(30, 41, 59, 0.5); border-radius: 12px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: #1e293b; padding: 12px; text-align: left; text-transform: uppercase; font-size: 12px; color: #94a3b8; }
        td { padding: 12px; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

    <div class="slide-container">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold"><i class="fa-solid fa-chart-line text-blue-500 mr-2"></i> Assembly Master Report</h2>
            <input type="text" placeholder="🔍 ค้นหารหัสสินค้า หรือ Location..." class="bg-[#1e293b] p-2 rounded-lg border border-[#334155] outline-none text-sm w-64" oninput="filterData(this.value)">
        </div>

        <div class="grid grid-cols-3 gap-4">
            <div class="kpi-card"><div id="countTotal" class="kpi-value">-</div><div class="text-[10px] uppercase text-slate-400">สินค้าทั้งหมด (PoductCode)</div></div>
            <div class="kpi-card"><div id="countDone" class="kpi-value text-emerald-500">-</div><div class="text-[10px] uppercase text-slate-400">จัดเตรียมแล้ว (Assembly)</div></div>
            <div class="kpi-card"><div id="countPending" class="kpi-value text-amber-500">-</div><div class="text-[10px] uppercase text-slate-400">ยังไม่เสร็จ</div></div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead><tr><th>รหัสสินค้า</th><th>Location</th><th>อัปเดตล่าสุด</th></tr></thead>
                <tbody id="tableBody"><tr><td colspan="3" class="text-center py-10">กำลังโหลดข้อมูล...</td></tr></tbody>
            </table>
        </div>

        <div class="mt-4 flex justify-end gap-3">
            <button onclick="exportToExcel()" class="bg-emerald-600 px-6 py-2 rounded-lg text-sm font-bold hover:bg-emerald-700 transition">
                <i class="fa-solid fa-file-excel mr-2"></i>Export Excel
            </button>
            <a href="index.html" class="bg-blue-600 px-6 py-2 rounded-lg text-sm font-bold hover:bg-blue-700 transition">กลับหน้าจัดการ</a>
        </div>
    </div>

    <script>
        const appId = "ae5d7dce-1c12-4c53-b201-5a2d7c5b5411";
        const apiKey = "V2-b1wGR-Nj1SR-0MhEx-QWCHT-Mllly-cZnc9-PHCAK-r1f85";
        let masterRecords = [], totalProductCount = 0;

        async function loadData() {
            const [resM, resP] = await Promise.all([
                fetch(`https://api.appsheet.com/api/v2/apps/${appId}/tables/AssemblyMaster/Find`, { method: "POST", headers: { "ApplicationAccessKey": apiKey, "Content-Type": "application/json" }, body: JSON.stringify({ Action: "Find", Rows: [] }) }),
                fetch(`https://api.appsheet.com/api/v2/apps/${appId}/tables/PoductCode/Find`, { method: "POST", headers: { "ApplicationAccessKey": apiKey, "Content-Type": "application/json" }, body: JSON.stringify({ Action: "Find", Rows: [] }) })
            ]);
            masterRecords = await resM.json();
            totalProductCount = (await resP.json()).length;
            render(masterRecords);
        }

        function render(data) {
            const done = masterRecords.filter(r => r.Location && r.Location.trim() !== "").length;
            document.getElementById('countTotal').innerText = totalProductCount;
            document.getElementById('countDone').innerText = done;
            document.getElementById('countPending').innerText = totalProductCount - done;

            document.getElementById('tableBody').innerHTML = data.map(r => `
                <tr>
                    <td class="font-bold text-white">${r.AssemblyMasterNew}</td>
                    <td class="text-blue-400">${r.Location || '-'}</td>
                    <td class="text-slate-400 text-xs">${r.Datemodified || '-'}</td>
                </tr>
            `).join('');
        }

        function filterData(q) {
            render(masterRecords.filter(r => r.AssemblyMasterNew?.toLowerCase().includes(q.toLowerCase()) || r.Location?.toLowerCase().includes(q.toLowerCase())));
        }

        function exportToExcel() {
            const exportData = masterRecords.map(r => ({
                "Item Code": r.AssemblyMasterNew,
                "Location": r.Location || '-',
                "Last Modified": r.Datemodified || '-'
            }));
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "AssemblyReport");
            XLSX.writeFile(wb, "Assembly_Report.xlsx");
        }

        loadData();
    </script>
</body>
</html>
